            box-sizing: border-box;

        :root {
            --primary: #00F2FF;
            --accent: #7000FF;
            --bg: #0a0e27;
            --text: #ffffff;
            --border: #1a1f3a;
            --card-bg: rgba(26, 31, 58, 0.8);
        }

        body {

            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ===== HEADER ===== */
        .shop-header {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .shop-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .shop-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .shop-logo span {
            color: var(--primary);
        }

        .shop-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .shop-nav a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s;
        }

        .shop-nav a:hover {
            color: var(--primary);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: black;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* ===== SEARCH BAR ===== */
        .search-section {
            padding: 2rem 0;
            background: rgba(0, 242, 255, 0.05);
            margin-bottom: 2rem;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        /* ===== MAIN LAYOUT ===== */
        .shop-main {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* ===== SIDEBAR FILTERS ===== */
        .filters-sidebar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .filter-item:hover {
            color: var(--primary);
        }

        .filter-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .filter-item label {
            cursor: pointer;
            flex: 1;
        }

        /* ===== PRODUCTS GRID ===== */
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            object-fit: cover;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: black;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;

        .product-info {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            font-size: 0.95rem;
        }

        .product-condition {
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .stars {
            color: var(--primary);
        }

        .rating-count {
            opacity: 0.7;
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .price-current {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .price-original {
            font-size: 0.9rem;
            text-decoration: line-through;
            opacity: 0.6;
        }

        .price-discount {
            font-size: 0.8rem;
            background: rgba(255, 100, 0, 0.2);
            color: #ff6400;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }

        .product-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: auto;
        }

        .add-cart-btn {
            flex: 1;
            padding: 0.8rem;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .add-cart-btn:hover {
            background: #00d1e0;
            transform: scale(1.05);
        }

        .wishlist-btn {
            padding: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;

        .wishlist-btn:hover {
            border-color: var(--primary);

            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            opacity: 0.7;
        }

            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);

            opacity: 0.7;
            margin-top: 3rem;

        /* ===== ANIMATIONS ===== */
        .product-card {

            opacity: 0;

            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(n+4) { animation-delay: 0.2s; }

            { id: 41, name: "iMac 24\" M3", brand: "Apple", category: "computers", condition: "new", price: 189999, originalPrice: 220000, rating: 4.8, reviews: 234, badge: "Desktop", image: "shopping__2_.webp" },
            { id: 42, name: "iMac 24\" M3", brand: "Apple", category: "computers", condition: "refurbished", price: 129999, originalPrice: 189999, rating: 4.7, reviews: 167, image: "shopping__2_.webp" },
            { id: 43, name: "Microsoft Surface Laptop 6", brand: "Microsoft", category: "computers", condition: "new", price: 119999, originalPrice: 145000, rating: 4.6, reviews: 198, image: "download.webp" },
            { id: 44, name: "Microsoft Surface Laptop 6", brand: "Microsoft", category: "computers", condition: "refurbished", price: 79999, originalPrice: 119999, rating: 4.5, reviews: 123, image: "download.webp" },
            { id: 45, name: "Dell Desktop PC with Monitor", brand: "Dell", category: "computers", condition: "new", price: 69999, originalPrice: 89999, rating: 4.4, reviews: 156, image: "shopping__3_.webp" },
            { id: 46, name: "Dell Desktop PC with Monitor", brand: "Dell", category: "computers", condition: "refurbished", price: 44999, originalPrice: 69999, rating: 4.3, reviews: 98, image: "shopping__3_.webp" },
            { id: 47, name: "HP All-in-One Desktop 24\"", brand: "HP", category: "computers", condition: "new", price: 59999, originalPrice: 75000, rating: 4.3, reviews: 134, image: "61wHY43GnlL__AC_UF8941000_QL80_.png" },
            { id: 48, name: "HP All-in-One Desktop 24\"", brand: "HP", category: "computers", condition: "refurbished", price: 39999, originalPrice: 59999, rating: 4.2, reviews: 89, image: "61wHY43GnlL__AC_UF8941000_QL80_.png" },
        ];

        let filteredProducts = [...products];
        let cart = [];

        // DOM Elements
        const productsGrid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const cartCountEl = document.getElementById('cartCount');

        // Initialize
        function init() {
            renderProducts();
            setupEventListeners();
            updateCartCount();
        }

        // Render Products
        function renderProducts() {
            if (filteredProducts.length === 0) {
                productsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No products found</h3>
                        <p>Try adjusting your filters or search query</p>
                    </div>
                `;
                return;
            }

            productsGrid.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="/mnt/user-data/uploads/${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/180?text=${product.name}'">
                        ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-condition">${product.condition === 'new' ? '✓ New (Sealed)' : '✓ Refurbished (Grade A)'}</p>
                        <div class="product-rating">
                            <span class="stars">
                                ${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5 - Math.floor(product.rating))}
                            </span>
                            <span class="rating-count">(${product.reviews})</span>
                        </div>
                        <div class="product-price">
                            <span class="price-current">KES ${product.price.toLocaleString()}</span>
                            <span class="price-original">KES ${product.originalPrice.toLocaleString()}</span>
                            <span class="price-discount">-${Math.round((1 - product.price / product.originalPrice) * 100)}%</span>
                        </div>
                        <div class="product-actions">
                            <button class="add-cart-btn" onclick="addToCart(${product.id})">
                                <i class="fas fa-shopping-bag"></i> Add
                            </button>
                            <button class="wishlist-btn" onclick="toggleWishlist(${product.id})" title="Add to Wishlist">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Setup Event Listeners
        function setupEventListeners() {
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            // Category filters
            document.getElementById('filter-all').addEventListener('change', () => {
                document.getElementById('filter-phones').checked = false;
                document.getElementById('filter-computers').checked = false;
                filteredProducts = [...products];
                renderProducts();
            });

            document.getElementById('filter-phones').addEventListener('change', applyFilters);
            document.getElementById('filter-computers').addEventListener('change', applyFilters);

            // Condition filters
            document.getElementById('filter-new').addEventListener('change', applyFilters);
            document.getElementById('filter-refurbished').addEventListener('change', applyFilters);

            // Price filters
            ['budget', 'mid', 'premium'].forEach(range => {
                document.getElementById(`filter-${range}`).addEventListener('change', applyFilters);
            });

            // Brand filters
            ['apple', 'samsung', 'huawei', 'oppo', 'hp', 'lenovo'].forEach(brand => {
                document.getElementById(`filter-${brand}`).addEventListener('change', applyFilters);
            });
        }

        // Perform Search
        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query === '') {
                filteredProducts = [...products];
            } else {
                filteredProducts = products.filter(p => 
                    p.name.toLowerCase().includes(query) ||
                    p.brand.toLowerCase().includes(query) ||
                    p.category.toLowerCase().includes(query)
                );
            }
            renderProducts();
        }

        // Apply Filters
        function applyFilters() {
            let result = [...products];

            // Category filters
            const categoryFilters = [];
            if (document.getElementById('filter-phones').checked) categoryFilters.push('phones');
            if (document.getElementById('filter-computers').checked) categoryFilters.push('computers');
            if (categoryFilters.length > 0) {
                result = result.filter(p => categoryFilters.includes(p.category));
            }

            // Condition filters
            const conditionFilters = [];
            if (document.getElementById('filter-new').checked) conditionFilters.push('new');
            if (document.getElementById('filter-refurbished').checked) conditionFilters.push('refurbished');
            if (conditionFilters.length > 0) {
                result = result.filter(p => conditionFilters.includes(p.condition));
            }

            // Price filters
            const priceFilters = [];
            if (document.getElementById('filter-budget').checked) priceFilters.push(p => p.price < 25000);
            if (document.getElementById('filter-mid').checked) priceFilters.push(p => p.price >= 25000 && p.price <= 100000);
            if (document.getElementById('filter-premium').checked) priceFilters.push(p => p.price > 100000);
            
            if (priceFilters.length > 0) {
                result = result.filter(p => priceFilters.some(f => f(p)));
            }

            // Brand filters
            const brandFilters = [];
            if (document.getElementById('filter-apple').checked) brandFilters.push('Apple');
            if (document.getElementById('filter-samsung').checked) brandFilters.push('Samsung');
            if (document.getElementById('filter-huawei').checked) brandFilters.push('Huawei');
            if (document.getElementById('filter-oppo').checked) brandFilters.push('OPPO');
            if (document.getElementById('filter-hp').checked) brandFilters.push('HP');
            if (document.getElementById('filter-lenovo').checked) brandFilters.push('Lenovo');
            if (brandFilters.length > 0) {
                result = result.filter(p => brandFilters.includes(p.brand));
            }

            filteredProducts = result;
            renderProducts();
        }

        // Add to Cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartCount();
            showNotification(`Added "${product.name}" to cart!`);
        }

        // Toggle Wishlist
        function toggleWishlist(productId) {
            const btn = event.target.closest('.wishlist-btn');
            btn.classList.toggle('active');
            btn.innerHTML = btn.classList.contains('active') 
                ? '<i class="fas fa-heart"></i>' 
                : '<i class="far fa-heart"></i>';
        }

        // Update Cart Count
        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCountEl.textContent = totalItems;
        }

        // Notification
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: var(--primary);
                color: black;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
