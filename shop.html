<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNovaphy Shop | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-light: #8B83FF;
            --primary-dark: #4A42D9;
            --accent: #FF6584;
            --bg: #0A0A1A;
            --text: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.1), transparent 70%);
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation .circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-animation .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
            background: radial-gradient(circle, rgba(255, 101, 132, 0.08), transparent 70%);
        }

        .bg-animation .circle:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.05), transparent 70%);
        }

        @keyframes float {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(50px, -30px) scale(1.05);
            }
            50% {
                transform: translate(-20px, 40px) scale(0.95);
            }
            75% {
                transform: translate(30px, -20px) scale(1.02);
            }
        }

        /* Main Content */
        .coming-soon {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .logo span {
            -webkit-text-fill-color: var(--text);
            background: none;
        }

        .badge {
            display: inline-block;
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .main-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .main-title .highlight {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 550px;
            margin: 0 auto 2.5rem;
            line-height: 1.8;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            min-width: 80px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .countdown-item:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .countdown-item .number {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 0.3rem;
            display: block;
        }

        /* Notify Form */
        .notify-form {
            display: flex;
            gap: 0.8rem;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .notify-form input {
            flex: 1;
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .notify-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(108, 99, 255, 0.1);
        }

        .notify-form input::placeholder {
            color: var(--text-muted);
        }

        .notify-form button {
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            white-space: nowrap;
        }

        .notify-form button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(108, 99, 255, 0.3);
        }

        .notify-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 0.8rem;
            border-radius: 10px;
            margin-top: 0.5rem;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-links a {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .countdown {
                gap: 0.8rem;
                flex-wrap: wrap;
            }

            .countdown-item {
                min-width: 60px;
                padding: 0.8rem 1rem;
            }

            .countdown-item .number {
                font-size: 1.8rem;
            }

            .notify-form {
                flex-direction: column;
            }

            .notify-form button {
                width: 100%;
                justify-content: center;
            }

            .main-title {
                font-size: clamp(2.5rem, 10vw, 3.5rem);
            }
        }

        @media (max-width: 480px) {
            .countdown-item {
                min-width: 50px;
                padding: 0.6rem 0.8rem;
            }

            .countdown-item .number {
                font-size: 1.4rem;
            }

            .logo {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Main Content -->
    <div class="coming-soon">
        <!-- Logo -->
        <div class="logo">TECH<span>NOVAPHY</span></div>

        <!-- Badge -->
        <div class="badge">
            <i class="fas fa-rocket" style="margin-right: 0.5rem;"></i> Launching Soon
        </div>

        <!-- Title -->
        <h1 class="main-title">
            We're <span class="highlight">Coming Soon</span>
        </h1>

        <!-- Subtitle -->
        <p class="subtitle">
            We're working hard to bring you the best tech products in Kenya.
            Stay tuned for our grand opening!
        </p>

        <!-- Countdown Timer -->
        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <!-- Notify Form -->
        <form class="notify-form" id="notifyForm">
            <input type="email" id="emailInput" placeholder="Enter your email to get notified" required />
            <button type="submit" id="notifyBtn">
                <i class="fas fa-bell" style="margin-right: 0.5rem;"></i> Notify Me
            </button>
        </form>

        <div class="status-message" id="statusMessage"></div>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://wa.me/254799269573" target="_blank" aria-label="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:technovaphysolutions@gmail.com" target="_blank" aria-label="Email">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="tel:+254799269573" target="_blank" aria-label="Phone">
                <i class="fas fa-phone"></i>
            </a>
            <a href="#" target="_blank" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" target="_blank" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
        </div>
    </div>

    <script>
        // ============================================================
        //  COUNTDOWN TIMER (30 days from now)
        // ============================================================
        function startCountdown() {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + 30); // 30 days from now

            function updateCountdown() {
                const now = new Date().getTime();
                const distance = targetDate.getTime() - now;

                if (distance < 0) {
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        startCountdown();

        // ============================================================
        //  NOTIFY FORM
        // ============================================================
        const form = document.getElementById('notifyForm');
        const emailInput = document.getElementById('emailInput');
        const notifyBtn = document.getElementById('notifyBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showStatus('Please enter your email address.', 'error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showStatus('Please enter a valid email address.', 'error');
                return;
            }

            // Disable button
            notifyBtn.disabled = true;
            notifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subscribing...';

            // Simulate API call (replace with your actual EmailJS or backend)
            setTimeout(() => {
                showStatus('✅ Thank you! We\'ll notify you when we launch.', 'success');
                emailInput.value = '';
                notifyBtn.disabled = false;
                notifyBtn.innerHTML = '<i class="fas fa-bell"></i> Notify Me';

                // Reset after 5 seconds
                setTimeout(() => {
                    statusMessage.className = 'status-message';
                    statusMessage.style.display = 'none';
                }, 5000);
            }, 1500);
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
        }
    </script>

</body>
    </html>
